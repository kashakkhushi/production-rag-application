name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        cache: 'pip'
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    - name: Run Backend Tests
      run: |
        cd backend
        python -m pytest tests/

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    - name: Run Build
      run: |
        cd frontend
        npm run build
    - name: Run Linter
      run: |
        cd frontend
        npm run lint
    - name: Run Typecheck
      run: |
        cd frontend
        npx tsc --noEmit
    - name: Run Frontend Tests
      run: |
        cd frontend
        npm run test
